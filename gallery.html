<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RANGRI HOMESTAY | Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="gallery">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>
    <header class="subhero">
      <nav class="navbar container">
        <a class="brand" href="index.html">
          <span class="brand-dot">RH</span>
          <span>RANGRI HOMESTAY</span>
        </a>
        <div class="nav-links">
          <a href="index.html" data-nav="home">Home</a>
          <a href="about.html" data-nav="about">About</a>
          <a href="gallery.html" data-nav="gallery">Gallery</a>
          <a href="rooms.html" data-nav="rooms">Rooms</a>
          <a href="booking.html" class="nav-book" data-nav="booking">Book Stay</a>
        </div>
      </nav>
      <div class="container subhero-content reveal">
        <p class="eyebrow">Photo Gallery</p>
        <h1>Real visuals from Rangri Homestay, Manali.</h1>
      </div>
    </header>
    <main>
      <section class="section section-dark reveal">
        <div class="container">
          <div class="gallery-grid" id="galleryGrid"></div>
        </div>
      </section>
    </main>
    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button id="closeLightbox" class="lightbox-close" aria-label="Close image">x</button>
      <img id="lightboxImage" src="" alt="Rangri Homestay photo preview" />
    </div>
    <footer class="footer container">
      <p>RANGRI HOMESTAY | Manali, Himachal Pradesh</p>
      <p>Source images: thehomestay.co.in listing</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
